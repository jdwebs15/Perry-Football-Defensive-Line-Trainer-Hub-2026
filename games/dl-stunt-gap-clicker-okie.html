<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Game 13 — DL Stunt Gap Clicker (OKIE)</title>
<link rel="stylesheet" href="../styles.css"/>
</head>

<body>
<div class="game-shell">

<!-- TOP BAR -->
<div class="topbar">
  <a class="ghost-btn" href="../index.html">← Back to Hub</a>
  <div class="brand-row">
    <span class="status-chip live">LIVE</span>
    <span class="status-chip">GAME 13</span>
    <span class="status-chip">DL STUNT GAP CLICKER</span>
  </div>
</div>

<!-- HUD -->
<div class="hud-grid">
  <div class="hud-box"><span>Player</span><strong id="hudPlayer">—</strong></div>
  <div class="hud-box"><span>Question</span><strong id="hudQ">1 / 6</strong></div>
  <div class="hud-box"><span>Misses</span><strong id="hudMiss">0</strong></div>
</div>

<!-- FIELD -->
<div class="field">
  <div id="dlE" class="dl">E</div>
  <div id="dlN" class="dl">N</div>
  <div id="dlT" class="dl">T</div>
</div>

<!-- QUESTION -->
<div class="question-box">
  <h2 id="questionTitle"></h2>
  <p id="questionText"></p>

  <div class="answers">
    <button onclick="answer('A')">A</button>
    <button onclick="answer('B')">B</button>
    <button onclick="answer('C')">C</button>
  </div>
</div>

</div>

<script>

/* =========================
   CORE ALIGNMENT (FIXED)
========================= */

function place(el,x,y){
  el.style.left = x + '%';
  el.style.top = y + '%';
}

function setFront(call){

  const rip = call.includes('RIP');

  // END — 5 TECH (STRONG)
  place(dlE, rip ? 72 : 28, 60);

  // NOSE — STRONG SHADE
  place(dlN, rip ? 55 : 45, 60);

  // 🔥 TACKLE — TRUE 4i (FIXED)
  place(dlT, rip ? 42 : 58, 60);

}

/* =========================
   QUESTIONS
========================= */

const questions = [

{
call:'OKIE RIP',
title:'Storm — Nose',
text:'Where do you finish?',
correct:'B'
},

{
call:'OKIE RIP',
title:'Seattle — Nose',
text:'Where do you finish?',
correct:'A'
},

{
call:'OKIE RIP',
title:'Cobra — Tackle',
text:'Where do you finish?',
correct:'A'
},

{
call:'OKIE RIP',
title:'Mow Buzz — Tackle',
text:'Where do you finish?',
correct:'C'
},

{
call:'OKIE RIP',
title:'New England — End',
text:'Where do you finish?',
correct:'A'
},

{
call:'OKIE RIP',
title:'Double Texas — End',
text:'Where do you finish?',
correct:'C'
}

];

let current = 0;
let misses = 0;

function loadQ(){

  const q = questions[current];

  document.getElementById('questionTitle').innerText = q.title;
  document.getElementById('questionText').innerText = q.text;

  setFront(q.call);
}

function answer(a){

  const q = questions[current];

  if(a !== q.correct){
    misses++;
    document.getElementById('hudMiss').innerText = misses;
    return;
  }

  current++;

  if(current >= questions.length){
    alert('Done');
    return;
  }

  document.getElementById('hudQ').innerText = (current+1) + ' / ' + questions.length;

  loadQ();
}

loadQ();

</script>

<style>
.field{
  position:relative;
  height:300px;
  background:#081a2c;
  margin:20px;
}

.dl{
  position:absolute;
  width:40px;
  height:40px;
  background:#1e88e5;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>

</body>
</html>
