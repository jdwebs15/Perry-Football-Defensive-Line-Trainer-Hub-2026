<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game 14 — Single Man Gap Exchange</title>
<link rel="stylesheet" href="../styles.css" />
<style>
  .field {
    position: relative;
    width: 100%;
    height: 320px;
    border-radius: 14px;
    background: radial-gradient(circle at center, #0f1c2e, #08111d);
    border: 1px solid rgba(255,255,255,.08);
    overflow: hidden;
    margin-top: 12px;
  }

  .player {
    position: absolute;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #1f2f4a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: white;
    border: 2px solid rgba(255,255,255,.2);
  }

  .arrow {
    position: absolute;
    width: 6px;
    height: 0;
    background: red;
    transform-origin: top center;
    opacity: 0;
  }

  .arrow::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: -5px;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 12px solid red;
  }

  .animate {
    animation: growArrow .7s ease-out forwards;
  }

  @keyframes growArrow {
    from { height: 0; opacity: 0; }
    to { height: 80px; opacity: 1; }
  }
</style>
</head>

<body>
<div class="game-shell">

<div class="topbar">
  <a class="ghost-btn" href="../index.html">← Back to Hub</a>
  <span class="brand-badge">GAME 14 — SINGLE MAN</span>
</div>

<div class="start-card">
  <h2>Single Man Gap Exchange</h2>
  <p>LB is coming. You are NOT staying in your gap. Read it and finish correctly.</p>

  <input id="name" class="text-input" placeholder="Player name"/>
  <button class="btn" onclick="start()">Start Game</button>
</div>

<div id="game" class="hidden">
  <div class="hud-grid">
    <div class="hud-box"><span id="player"></span></div>
    <div class="hud-box"><span id="q"></span></div>
    <div class="hud-box"><span id="miss"></span></div>
  </div>

  <div class="field" id="field"></div>

  <h3 id="question"></h3>

  <div id="answers" class="answer-grid"></div>

  <div id="feedback" class="feedback-box hidden"></div>
</div>

</div>

<script>

const QUESTIONS = [

  // JACK RULE (C GAP)
  {
    text: "NAW — Jack blitz. You are the End. Where do you finish?",
    correct: "B",
    explain: "Jack comes outside → you close B.",
    stunt: "B"
  },

  {
    text: "MISSILE — Sam blitz. You are the End. Where do you finish?",
    correct: "B",
    explain: "Sam replaces you → you close B.",
    stunt: "B"
  },

  {
    text: "NAIL — Sam blitz. You are the End. Where do you finish?",
    correct: "B",
    explain: "Same exchange rule → close B.",
    stunt: "B"
  },

  // TEXAS SPECIAL
  {
    text: "TEXAS — Jack B-gap blitz. You are the Tackle. Where do you finish?",
    correct: "C",
    explain: "Jack takes B → you wrap to C.",
    stunt: "C"
  },

  // MOP / INTERIOR
  {
    text: "MOP — Mike blitz. You are the Nose. Where do you finish?",
    correct: "Opp A",
    explain: "Mike replaces → you fall back opposite A.",
    stunt: "A"
  },

  {
    text: "MOP — Mike blitz. You are the Tackle. Where do you finish?",
    correct: "B",
    explain: "Interior exchange → stay B but adjust path.",
    stunt: "B"
  },

  // MORE COVERAGE
  {
    text: "NAW — Jack blitz. You are the Tackle. Where do you finish?",
    correct: "B",
    explain: "End closes → you stay B.",
    stunt: "B"
  },

  {
    text: "MISSILE — Sam blitz. You are the Nose. Where do you finish?",
    correct: "Opp A",
    explain: "Interior still falls back.",
    stunt: "A"
  }

];

let i = 0;
let misses = 0;
let player = "";

function start() {
  player = document.getElementById("name").value;
  if (!player) return;

  document.querySelector(".start-card").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  next();
}

function next() {
  if (i >= QUESTIONS.length) {
    alert("Done — run it back clean.");
    location.reload();
    return;
  }

  const q = QUESTIONS[i];

  document.getElementById("player").innerText = player;
  document.getElementById("q").innerText = `Q ${i+1}/${QUESTIONS.length}`;
  document.getElementById("miss").innerText = `Misses ${misses}`;

  document.getElementById("question").innerText = q.text;

  const answers = ["A","B","C","Opp A"];
  const container = document.getElementById("answers");
  container.innerHTML = "";

  answers.sort(()=>Math.random()-0.5).forEach(a=>{
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.innerText = a;
    btn.onclick = ()=>check(a,q);
    container.appendChild(btn);
  });

  drawField(q.stunt);
}

function check(a,q){
  const fb = document.getElementById("feedback");

  if(a===q.correct){
    fb.innerHTML = `<b>Correct</b><br>${q.explain}`;
    fb.classList.remove("hidden");

    setTimeout(()=>{
      i++;
      fb.classList.add("hidden");
      next();
    },2000);

  } else {
    misses++;
    fb.innerHTML = `<b>Miss</b><br>${q.explain}`;
    fb.classList.remove("hidden");
  }
}

function drawField(type){
  const f = document.getElementById("field");
  f.innerHTML = "";

  const end = makePlayer("E", 40, 180);
  const nose = makePlayer("N", 140, 160);
  const tackle = makePlayer("T", 240, 180);

  f.appendChild(end);
  f.appendChild(nose);
  f.appendChild(tackle);

  animate(end, type);
}

function makePlayer(label,x,y){
  const p = document.createElement("div");
  p.className = "player";
  p.innerText = label;
  p.style.left = x+"px";
  p.style.top = y+"px";
  return p;
}

function animate(p,type){
  const arrow = document.createElement("div");
  arrow.className = "arrow";

  let color = "red";

  if(type==="A") color = "#3ba3ff";
  if(type==="B") color = "#ff3b3b";
  if(type==="C") color = "#ffd54a";

  arrow.style.background = color;
  arrow.style.borderTopColor = color;

  arrow.style.left = p.offsetLeft+18+"px";
  arrow.style.top = p.offsetTop+"px";

  document.getElementById("field").appendChild(arrow);

  setTimeout(()=>arrow.classList.add("animate"),100);
}

</script>
</body>
</html>
