<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game 14 — Single Man Gap Exchange</title>
<link rel="stylesheet" href="../styles.css">

<style>
body{background:#0b1f33;color:white;font-family:Arial;margin:0;padding:20px}

#board{
  position:relative;
  height:320px;
  background:#081a2c;
  border-radius:12px;
  margin-bottom:20px;
}

/* DL */
.dl{
  position:absolute;
  width:40px;height:40px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;
}

/* COLORS */
.e{left:73%;top:63%;background:#1e90ff}
.n{left:54%;top:63%;background:#1e90ff}
.t{left:66%;top:63%;background:#1e90ff} /* TRUE 4I */

.sm{position:absolute;left:18%;top:65%;background:#34d399;color:black}

/* GAPS */
.gaps{display:flex;gap:10px}
.gap{padding:10px;background:#142c44;border-radius:8px;cursor:pointer}
.gap:hover{background:#1e4d7a}

/* LINES */
.line{
  position:absolute;
  height:4px;
  transform-origin:left center;
}

.green{background:#34d399}
.blue{background:#60a5fa}

</style>
</head>

<body>

<h2>Game 14 — Single Man Gap Exchange</h2>

<div id="board">
  <div id="E" class="dl e">E</div>
  <div id="N" class="dl n">N</div>
  <div id="T" class="dl t">T</div>
  <div id="SM" class="dl sm">SM</div>
</div>

<div id="question"></div>

<div class="gaps">
  <div class="gap" onclick="answer('A')">A</div>
  <div class="gap" onclick="answer('B')">B</div>
  <div class="gap" onclick="answer('C')">C</div>
</div>

<script>

const questions = [

/* JACK */
{
 text:"JACK — Tackle closes B. Where do you finish?",
 answer:"B",
 moves:[
  {p:"SM",to:"C",color:"green"},
  {p:"T",to:"B",color:"blue"},
  {p:"E",to:"C",color:"blue"}
 ]
},

/* TEXAS */
{
 text:"TEXAS — Tackle goes C. Where do you finish?",
 answer:"C",
 moves:[
  {p:"SM",to:"B",color:"green"},
  {p:"T",to:"C",color:"blue"},
  {p:"E",to:"C",color:"blue"}
 ]
},

/* MOP */
{
 text:"MOP — End closes B. Where do you finish?",
 answer:"B",
 moves:[
  {p:"SM",to:"C",color:"green"},
  {p:"E",to:"B",color:"blue"},
  {p:"T",to:"B",color:"blue"}
 ]
},

/* NAW */
{
 text:"NAW — Nose opposite A. Where do you finish?",
 answer:"A",
 moves:[
  {p:"SM",to:"A",color:"green"},
  {p:"N",to:"A",color:"blue"},
  {p:"T",to:"B",color:"blue"}
 ]
},

/* MISSILE */
{
 text:"MISSILE — Nose strong B. Where do you finish?",
 answer:"B",
 moves:[
  {p:"SM",to:"A",color:"green"},
  {p:"N",to:"B",color:"blue"},
  {p:"T",to:"B",color:"blue"}
 ]
},

/* NAIL */
{
 text:"NAIL — Nose strong B. Where do you finish?",
 answer:"B",
 moves:[
  {p:"SM",to:"A",color:"green"},
  {p:"N",to:"B",color:"blue"},
  {p:"T",to:"B",color:"blue"}
 ]
}

];

let q=0;

function load(){
 document.getElementById("question").innerText=questions[q].text;
 clearLines();
}

function answer(a){
 if(a===questions[q].answer){
   animate();
   setTimeout(()=>{
     q++;
     if(q>=questions.length){alert("Done");return;}
     load();
   },2000);
 } else {
   alert("Nope — read it again");
 }
}

function animate(){
 clearLines();
 questions[q].moves.forEach(m=>{
   draw(m.p,m.to,m.color);
 });
}

function draw(player,gap,color){
 const el=document.getElementById(player);
 const start=el.getBoundingClientRect();
 const board=document.getElementById("board").getBoundingClientRect();

 const target={
   A:150,
   B:220,
   C:290
 }[gap];

 const line=document.createElement("div");
 line.className="line "+color;

 line.style.left=(start.left-board.left)+"px";
 line.style.top=(start.top-board.top)+"px";
 line.style.width="120px";
 line.style.transform="rotate(0deg)";

 document.getElementById("board").appendChild(line);
}

function clearLines(){
 document.querySelectorAll(".line").forEach(l=>l.remove());
}

load();

</script>

</body>
</html>
