<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game 14 — Single Man Gap Exchange</title>
<link rel="stylesheet" href="../styles.css">

<style>

/* ===== FIELD ===== */
#board {
  position: relative;
  width: 100%;
  height: 320px;
  background: linear-gradient(#0b1f33, #0a1929);
  border-radius: 12px;
  margin-bottom: 20px;
  overflow: hidden;
}

/* DL TOKENS */
.dl {
  position: absolute;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #1e90ff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  transform: translate(-50%, -50%);
}

/* ALIGNMENT */
.e-strong { left: 73%; top: 63%; }
.n-shade  { left: 54%; top: 63%; }
.t-weak   { left: 66%; top: 63%; } /* TRUE 4I */

/* GAP BUTTONS */
.gaps {
  display: grid;
  grid-template-columns: repeat(6,1fr);
  gap: 10px;
}

.gap {
  padding: 10px;
  background: #142c44;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
}

.gap:hover {
  background: #1e4d7a;
}

/* HUD */
.hud {
  display: flex;
  gap: 15px;
  margin-bottom: 10px;
}

</style>
</head>

<body>

<div class="wrap">

<a href="../index.html">← Back to Hub</a>

<div class="hud">
  <div>Player: <span id="playerName"></span></div>
  <div>Question: <span id="qNum"></span></div>
  <div>Misses: <span id="misses">0</span></div>
</div>

<h2>Game 14 — Single Man Gap Exchange</h2>

<div id="board">
  <div id="E" class="dl e-strong">E</div>
  <div id="N" class="dl n-shade">N</div>
  <div id="T" class="dl t-weak">T</div>
</div>

<div id="question"></div>

<div class="gaps">
  <div class="gap" onclick="answer('A')">A</div>
  <div class="gap" onclick="answer('B')">B</div>
  <div class="gap" onclick="answer('C')">C</div>
</div>

</div>

<script>

let player = prompt("Enter Player Name:");
document.getElementById("playerName").innerText = player;

let questions = [
  {
    stunt: "New England",
    player: "E",
    answer: "A",
    text: "New England — End long stick. Where do you finish?"
  },
  {
    stunt: "Boston",
    player: "N",
    answer: "A",
    text: "Boston — Nose. Where do you finish?"
  },
  {
    stunt: "Storm",
    player: "N",
    answer: "B",
    text: "Storm — Nose strong B. Where do you finish?"
  },
  {
    stunt: "Cobra",
    player: "T",
    answer: "A",
    text: "Cobra — T weak A. Where do you finish?"
  }
];

let current = 0;
let misses = 0;

function loadQ() {
  document.getElementById("qNum").innerText = (current+1) + "/" + questions.length;
  document.getElementById("question").innerText = questions[current].text;
}

function answer(choice) {
  if (choice === questions[current].answer) {
    current++;
    if (current >= questions.length) {
      alert("Done! Misses: " + misses);
      return;
    }
    loadQ();
  } else {
    misses++;
    document.getElementById("misses").innerText = misses;
  }
}

loadQ();

</script>

</body>
</html>
